<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEO QUEST AR | PRO</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        #ui-layer { position: absolute; bottom: 50px; left: 0; right: 0; text-align: center; z-index: 10; }
        #status { padding: 15px 30px; background: rgba(0, 255, 255, 0.1); border: 1px solid #00ffff; border-radius: 50px; color: #00ffff; display: inline-block; font-weight: bold; }
        
        #start-screen { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; border: 1px solid #00ffff; background: transparent; color: #fff; margin-bottom: 20px; border-radius: 10px; width: 280px; text-align: center; }
        button { padding: 15px 40px; border: none; background: #00ffff; color: #000; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <input type="text" id="user-name" placeholder="Введіть нікнейм...">
        <button id="btn-start">РОЗПОЧАТИ МІСІЮ</button>
    </div>

    <div id="ui-layer"><div id="status">ГОТОВИЙ ДО ЗАПУСКУ</div></div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from "@mediapipe/tasks-vision";

        // КОНФІГУРАЦІЯ
        const questions = [
            { q: "Яка найбільша оболонка Землі?", a: "географічна" },
            { q: "Як називається повітряна оболонка?", a: "атмосфера" }
        ];

        let state = 'WAITING'; // WAITING, SPEAKING, LISTENING
        let currentIdx = 0, handLandmarker, scene, camera, renderer, holoPlane, holoVideo;
        
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO"
            });
            setup3D();
            requestAnimationFrame(loop);
        }

        function setup3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Голограма
            holoVideo = document.createElement('video');
            holoVideo.src = 'guide.mp4'; // Замініть на ваш файл
            holoVideo.loop = true; holoVideo.muted = true;
            
            const tex = new THREE.VideoTexture(holoVideo);
            holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 1.5), new THREE.MeshBasicMaterial({ map: tex, transparent: true }));
            holoPlane.position.set(0, 0, -2);
            scene.add(holoPlane);
            camera.position.z = 2;
        }

        function speak(text, cb) {
            state = 'SPEAKING';
            holoVideo.play();
            status.innerText = text;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'uk-UA';
            u.onend = () => { holoVideo.pause(); cb(); };
            window.speechSynthesis.speak(u);
        }

        function startListening() {
            state = 'LISTENING';
            status.innerText = "СЛУХАЮ...";
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'uk-UA';
            rec.onresult = (e) => {
                const res = e.results[0][0].transcript.toLowerCase();
                if (res.includes(questions[currentIdx].a)) {
                    speak("Вірно!", () => { currentIdx++; state = 'WAITING'; status.innerText = "СТИСНИ КУЛАК"; });
                } else {
                    speak("Спробуй ще раз", startListening);
                }
            };
            rec.start();
        }

        function loop() {
            if (video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks?.length > 0 && state === 'WAITING') {
                    const hand = res.landmarks[0];
                    if (hand[8].y > hand[6].y && hand[12].y > hand[10].y) {
                        speak(questions[currentIdx].q, startListening);
                    }
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }

        document.getElementById('btn-start').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            document.getElementById('start-screen').remove();
            init();
        };
    </script>
</body>
</html>
