<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GEO QUEST AR | 2026</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: rgba(0,255,255,0.1); z-index: 150; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #00ff88); transition: width 0.6s ease; }

        #ui { position: absolute; bottom: 40px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        #status {
            background: rgba(0, 20, 20, 0.8); padding: 20px 30px; border-radius: 24px;
            color: #00ffff; font-weight: 700; border: 2px solid rgba(0, 255, 255, 0.5);
            text-align: center; width: 90%; max-width: 500px; font-size: 1.3rem; backdrop-filter: blur(10px);
        }
        
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #btn-start { background: #00ffff; color: #000; padding: 20px 60px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; font-size: 1.5rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="start-screen">
        <h1 style="color:#00ffff; margin-bottom:40px;">GEO AR</h1>
        <button id="btn-start">РОЗПОЧАТИ МІСІЮ</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui"><div id="status">Натисніть старт</div></div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video'), statusDiv = document.getElementById('status'), progressBar = document.getElementById('progress-bar');
        let handLandmarker, holoPlane, holoVideo, scene, camera, renderer, masterGroup, currentIdx = 0, isWaitingForGesture = true, isSpeaking = false;

        const questions = [
            { q: "Яка найбільша оболонка Землі?", a: ["географічна"] },
            { q: "Як називається повітряна оболонка планети?", a: ["атмосфера"] },
            { q: "Яка сфера Землі складається з усіх її вод?", a: ["гідросфера"] },
            { q: "Тверда оболонка Землі — це літосфера?", a: ["так", "літосфера"] },
            { q: "Сфера, де панує життя?", a: ["біосфера"] }
        ];

        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO"
            });
            setup3D();
        }

        function setup3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            masterGroup = new THREE.Group(); scene.add(masterGroup);
            
            holoVideo = document.createElement('video');
            holoVideo.src = 'assets/video/guide_hologram.mp4'; // Переконайтеся, що файл є
            holoVideo.muted = true; holoVideo.loop = true; holoVideo.playsInline = true;
            
            holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 1.4), new THREE.MeshBasicMaterial({ map: new THREE.VideoTexture(holoVideo), transparent: true }));
            holoPlane.position.set(0, 0.5, 0); holoPlane.visible = false;
            masterGroup.add(holoPlane);
            
            camera.position.z = 3;
            render();
        }

        function speak(text, callback) {
            isSpeaking = true;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'uk-UA';
            u.onend = () => { isSpeaking = false; if(callback) callback(); };
            window.speechSynthesis.speak(u);
        }

        function startListening() {
            statusDiv.innerText = "СЛУХАЮ ТЕБЕ...";
            statusDiv.style.borderColor = "#00ff88";
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'uk-UA';
            rec.onresult = (e) => {
                const res = e.results[0][0].transcript.toLowerCase();
                const isCorrect = questions[currentIdx].a.some(ans => res.includes(ans));
                
                if (isCorrect) {
                    speak("Правильно! Ти молодець.");
                    currentIdx++;
                    progressBar.style.width = (currentIdx / questions.length * 100) + "%";
                } else {
                    speak("Майже! Давай спробуємо ще раз.");
                }

                setTimeout(() => {
                    if (currentIdx < questions.length) {
                        isWaitingForGesture = true;
                        statusDiv.innerText = "ПОКАЖИ КУЛАК ✊";
                        statusDiv.style.borderColor = "rgba(0, 255, 255, 0.5)";
                        holoPlane.visible = false; holoVideo.pause();
                    } else {
                        statusDiv.innerText = "МІСІЮ ВИКОНАНО!";
                    }
                }, 2000);
            };
            rec.start();
        }

        function render() {
            requestAnimationFrame(render);
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks?.[0] && isWaitingForGesture) {
                    const hand = res.landmarks[0];
                    if (hand[8].y > hand[6].y && hand[12].y > hand[10].y) {
                        isWaitingForGesture = false;
                        holoPlane.visible = true; holoVideo.play();
                        speak(questions[currentIdx].q, startListening);
                    }
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('btn-start').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            document.getElementById('start-screen').style.display = 'none';
            initAI();
            statusDiv.innerText = "ПОКАЖИ КУЛАК ДЛЯ ПОЧАТКУ ✊";
        };
    </script>
</body>
</html>
